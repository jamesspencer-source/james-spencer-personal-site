<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">James M. Spencer social preview</title>
  <desc id="desc">Social preview card for James M. Spencer personal website.</desc>
  <rect width="1200" height="630" fill="#f1ebdf" />
  <rect x="88" y="88" width="1024" height="454" fill="none" stroke="rgba(21,24,20,0.16)" />
  <path d="M88 168h1024" stroke="#456352" stroke-width="3" />
  <text x="112" y="148" fill="#456352" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4">
    JAMES M. SPENCER
  </text>
  <text x="112" y="262" fill="#151814" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="600">
    Laboratory operations and
  </text>
  <text x="112" y="326" fill="#151814" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="600">
    scientific program leadership
  </text>
  <text x="112" y="392" fill="#151814" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="600">
    in complex research settings.
  </text>
  <text x="112" y="454" fill="#5d6259" font-family="Inter, Arial, sans-serif" font-size="25">
    Two research laboratories. Two buildings. Eight-week summer research program.
  </text>
  <text x="112" y="500" fill="#5d6259" font-family="Inter, Arial, sans-serif" font-size="25">
    Boston, Massachusetts.
  </text>
</svg>
